name: Parados
options:
  bundleIdPrefix: com.ywesee
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "3"
  DEVELOPMENT_TEAM: "4B37356EGR"

targets:
  Parados:
    type: application
    platform: iOS
    sources:
      - path: Parados
        excludes:
          - Resources/Games
      - path: Parados/Resources/Games
        buildPhase: resources
        type: folder
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ywesee.parados
      INFOPLIST_FILE: Parados/Info.plist
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "3"
      SWIFT_VERSION: "5.9"
      TARGETED_DEVICE_FAMILY: "1,2"
